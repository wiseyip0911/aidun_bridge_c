<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>V-Teeth卫齿士 · 消息看板</title>
  <!-- 主色 CMYK C:0 M:60 Y:100 K:0 → 屏显约 #FF6600 -->
  <style>
    :root {
      --vt-brand: #ff6600;
      --vt-brand-dim: #cc5200;
      --vt-brand-glow: rgba(255, 102, 0, 0.22);
      --bg: #100a07;
      --panel: #1a120d;
      --panel-2: #231810;
      --border: #3d2618;
      --text: #f5efe9;
      --muted: #b89682;
      --in: #2a1c16;
      --out: #4a2200;
      --out-border: #cc5200;
      --err: #e85d5d;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; height: 100%;
      font-family: system-ui, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
    }
    .brand-stripe {
      height: 3px; width: 100%;
      background: linear-gradient(90deg, var(--vt-brand), #ff9933);
    }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, var(--panel-2) 0%, var(--panel) 100%);
      gap: 12px; flex-wrap: wrap;
    }
    .brand-row {
      display: flex; align-items: center; gap: 12px; min-width: 0;
    }
    .brand-mark {
      width: 40px; height: 40px; border-radius: 10px;
      background: linear-gradient(145deg, var(--vt-brand), var(--vt-brand-dim));
      color: #fff; font-weight: 800; font-size: 13px; letter-spacing: -0.5px;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 20px var(--vt-brand-glow);
      flex-shrink: 0;
    }
    .brand-title {
      font-size: 17px; font-weight: 700; color: var(--text);
      line-height: 1.2;
    }
    .brand-title .accent { color: var(--vt-brand); }
    .brand-cn { font-weight: 600; margin-left: 4px; }
    .brand-sub {
      font-size: 12px; color: var(--muted); margin-top: 2px;
    }
    .header-right {
      display: flex; flex-direction: column; align-items: flex-end;
      gap: 4px; min-width: 0; flex: 1;
    }
    #status { font-size: 11px; color: var(--muted); text-align: right; word-break: break-all; }
    #err { color: var(--err); font-size: 12px; text-align: right; max-width: 100%; }
    .layout {
      display: flex; height: calc(100vh - 3px - 76px);
    }
    aside {
      width: 280px; min-width: 220px; border-right: 1px solid var(--border);
      background: var(--panel); overflow-y: auto;
    }
    .peer {
      padding: 12px 14px; cursor: pointer; border-bottom: 1px solid var(--border);
    }
    .peer:hover { background: #261a14; }
    .peer.active {
      background: rgba(255, 102, 0, 0.08);
      border-left: 3px solid var(--vt-brand);
      padding-left: 11px;
    }
    .peer-id { font-weight: 600; font-size: 14px; }
    .peer-preview {
      margin-top: 4px; font-size: 12px; color: var(--muted);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .peer-meta { margin-top: 2px; font-size: 11px; color: var(--muted); }
    main {
      flex: 1; display: flex; flex-direction: column; min-width: 0;
    }
    #thread-head {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      font-size: 15px; font-weight: 600;
      background: var(--panel);
    }
    #messages {
      flex: 1; overflow-y: auto; padding: 16px;
      display: flex; flex-direction: column; gap: 10px;
    }
    .bubble-row { display: flex; }
    .bubble-row.in { justify-content: flex-start; }
    .bubble-row.out { justify-content: flex-end; }
    .msg-wrap {
      display: flex; flex-direction: column; max-width: 78%; min-width: 0;
    }
    .bubble-row.in .msg-wrap { align-items: flex-start; }
    .bubble-row.out .msg-wrap { align-items: flex-end; }
    .sender-label {
      font-size: 12px; font-weight: 600; margin-bottom: 4px; padding: 0 2px;
    }
    .sender-label.me { color: var(--vt-brand); }
    .sender-label.peer { color: #d4a574; }
    .bubble {
      width: 100%; padding: 10px 12px; border-radius: 12px;
      font-size: 14px; line-height: 1.45; white-space: pre-wrap; word-break: break-word;
    }
    .bubble.in { background: var(--in); border: 1px solid var(--border); }
    .bubble.out {
      background: linear-gradient(160deg, #5c2800 0%, var(--out) 100%);
      border: 1px solid var(--out-border);
      box-shadow: 0 2px 12px rgba(255, 102, 0, 0.12);
    }
    .bubble-meta {
      margin-top: 4px; font-size: 11px; color: var(--muted);
    }
    #composer {
      display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border);
      background: var(--panel); align-items: flex-end;
    }
    #composer textarea {
      flex: 1; min-height: 44px; max-height: 160px; resize: vertical;
      padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border);
      background: #140d0a; color: var(--text); font-size: 14px;
    }
    #composer textarea:focus {
      outline: none; border-color: var(--vt-brand);
      box-shadow: 0 0 0 1px var(--vt-brand-glow);
    }
    #composer select {
      min-width: 120px; max-width: 160px; padding: 8px 10px; border-radius: 8px;
      border: 1px solid var(--border); background: #140d0a; color: var(--text);
      font-size: 13px; align-self: flex-end;
    }
    button {
      padding: 10px 18px; border-radius: 8px; border: none; cursor: pointer;
      background: linear-gradient(180deg, #ff7722, var(--vt-brand));
      color: #fff; font-weight: 600; font-size: 14px;
      box-shadow: 0 2px 8px var(--vt-brand-glow);
    }
    button:hover { filter: brightness(1.06); }
    button:disabled { opacity: 0.45; cursor: not-allowed; filter: none; }
    .empty { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>
  <div class="brand-stripe" aria-hidden="true"></div>
  <header>
    <div class="brand-row">
      <div class="brand-mark" title="V-Teeth">VT</div>
      <div>
        <div class="brand-title"><span class="accent">V-Teeth</span><span class="brand-cn">卫齿士</span></div>
        <div class="brand-sub">Aidun 实例消息看板</div>
      </div>
    </div>
    <div class="header-right">
      <span id="status"></span>
      <div id="err"></div>
    </div>
  </header>
  <div class="layout">
    <aside id="sidebar"></aside>
    <main>
      <div id="thread-head">请选择左侧联系人</div>
      <div id="messages"><div class="empty">加载中…</div></div>
      <div id="composer">
        <select id="channel" title="payload_json.channel，默认 lookup（走工具/能力）">
          <option value="lookup" selected>lookup 查询</option>
          <option value="summarize">summarize 摘要</option>
          <option value="chat">chat 闲聊</option>
        </select>
        <textarea id="input" placeholder="输入消息… (Enter 发送, Shift+Enter 换行)" rows="2"></textarea>
        <button id="send" type="button">发送</button>
      </div>
    </main>
  </div>
  <script>
    const UI_VERSION = "20260517-2";
    const POLL_MS = 5000;
    const POLL_FAST_MS = 900;
    const POLL_FAST_DURATION_MS = 15000;
    const SK = "aidun-vt-chat:peer";
    const CH_SK = "aidun-vt-chat:channel";

    let selectedPeer = sessionStorage.getItem(SK) || "";
    let lastSnapshot = null;
    let lastThreadKey = "";
    let selfInstanceId = "";
    let fastPollUntil = 0;
    let pollTimerId = null;

    (function initChannelSelect() {
      const sel = document.getElementById("channel");
      const saved = sessionStorage.getItem(CH_SK);
      if (saved && [...sel.options].some((o) => o.value === saved)) {
        sel.value = saved;
      }
      sel.addEventListener("change", () => {
        sessionStorage.setItem(CH_SK, sel.value);
      });
    })();

    function setErr(msg) {
      document.getElementById("err").textContent = msg || "";
    }

    function fmtLocal(ts) {
      if (!ts) return "";
      const s = ts.replace("Z", "+00:00");
      const d = new Date(s);
      if (isNaN(d.getTime())) return ts;
      return d.toLocaleString();
    }

    function nearBottom(el) {
      return el.scrollHeight - el.scrollTop - el.clientHeight < 80;
    }

    /** 将 JSON/日志里常见的字面量 \\n、\\t 转为真实换行，便于 pre-wrap 展示。 */
    function formatMessageText(text) {
      if (text == null || text === "") return "";
      let s = String(text);
      for (let i = 0; i < 3 && /\\[nrt]/.test(s); i++) {
        s = s
          .replace(/\\r\\n/g, "\n")
          .replace(/\\n/g, "\n")
          .replace(/\\r/g, "\n")
          .replace(/\\t/g, "\t");
      }
      return s;
    }

    function senderLabel(m) {
      if (m.direction === "outbound") return "我";
      const peer =
        m.peer_instance_id ||
        (m.direction === "inbound" ? selectedPeer : "") ||
        "对方";
      return peer;
    }

    function threadFingerprint(messages) {
      if (!messages.length) return UI_VERSION + "|empty";
      return (
        UI_VERSION +
        "|" +
        messages
        .map(
          (m) =>
            [
              m.ts,
              m.direction,
              m.text,
              m.record_type,
              m.channel,
              m.peer_instance_id,
            ].join("\x1f")
        )
        .join("\n")
      );
    }

    function currentPollMs() {
      return Date.now() < fastPollUntil ? POLL_FAST_MS : POLL_MS;
    }

    function scheduleNextPoll() {
      if (pollTimerId) clearTimeout(pollTimerId);
      pollTimerId = setTimeout(async () => {
        await refresh(false);
        scheduleNextPoll();
      }, currentPollMs());
    }

    function startFastPollBurst() {
      fastPollUntil = Date.now() + POLL_FAST_DURATION_MS;
      if (pollTimerId) clearTimeout(pollTimerId);
      refresh(true).then(() => scheduleNextPoll());
    }

    function renderSidebar(summaries, selfId) {
      const sb = document.getElementById("sidebar");
      sb.innerHTML = "";
      if (!summaries.length) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "暂无联系人(等 directory 或消息总账有记录)";
        sb.appendChild(d);
        return;
      }
      for (const s of summaries) {
        const div = document.createElement("div");
        div.className = "peer" + (s.peer === selectedPeer ? " active" : "");
        div.dataset.peer = s.peer;
        const id = document.createElement("div");
        id.className = "peer-id";
        id.textContent = s.peer + (s.peer === selfId ? " (本机)" : "");
        const pv = document.createElement("div");
        pv.className = "peer-preview";
        pv.textContent = formatMessageText(s.last_preview) || "(无预览)";
        const meta = document.createElement("div");
        meta.className = "peer-meta";
        const arrow = s.last_direction === "outbound" ? "→" : "←";
        meta.textContent = (s.last_ts ? fmtLocal(s.last_ts) : "") + "  " + arrow + " " + (s.last_record_type || "");
        div.appendChild(id);
        div.appendChild(pv);
        div.appendChild(meta);
        div.addEventListener("click", () => {
          selectedPeer = s.peer;
          lastThreadKey = "";
          sessionStorage.setItem(SK, selectedPeer);
          document.querySelectorAll(".peer").forEach((p) => p.classList.remove("active"));
          div.classList.add("active");
          document.getElementById("thread-head").textContent = "与 " + selectedPeer + " 的对话";
          refresh(true);
        });
        sb.appendChild(div);
      }
    }

    function renderThread(messages) {
      const box = document.getElementById("messages");
      const fp = threadFingerprint(messages);
      if (fp === lastThreadKey && box.querySelector(".bubble-row")) {
        return;
      }
      lastThreadKey = fp;
      const stick = nearBottom(box);
      box.innerHTML = "";
      if (!selectedPeer) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "请先在左侧选择一个联系人";
        box.appendChild(d);
        return;
      }
      if (!messages.length) {
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "与该联系人暂无消息记录(发一条或等对方发来)";
        box.appendChild(d);
        return;
      }
      for (const m of messages) {
        const isOut = m.direction === "outbound";
        const row = document.createElement("div");
        row.className = "bubble-row " + (isOut ? "out" : "in");
        const b = document.createElement("div");
        b.className = "bubble " + (isOut ? "out" : "in");
        const body = document.createElement("div");
        body.textContent = formatMessageText(m.text);
        const meta = document.createElement("div");
        meta.className = "bubble-meta";
        const metaParts = [fmtLocal(m.ts)];
        if (m.channel) metaParts.push(m.channel);
        if (m.record_type) metaParts.push(m.record_type);
        meta.textContent = metaParts.join("  ·  ");
        b.appendChild(body);
        b.appendChild(meta);
        const wrap = document.createElement("div");
        wrap.className = "msg-wrap";
        const label = document.createElement("div");
        label.className = "sender-label " + (isOut ? "me" : "peer");
        label.textContent = senderLabel(m);
        wrap.appendChild(label);
        wrap.appendChild(b);
        row.appendChild(wrap);
        box.appendChild(row);
      }
      if (stick) box.scrollTop = box.scrollHeight;
    }

    async function refresh(forceThread) {
      setErr("");
      const url =
        "/api/snapshot" +
        (selectedPeer ? "?peer=" + encodeURIComponent(selectedPeer) : "");
      const t0 = performance.now();
      let data;
      try {
        const r = await fetch(url);
        if (!r.ok) throw new Error("HTTP " + r.status);
        data = await r.json();
      } catch (e) {
        setErr(String(e));
        return;
      }
      lastSnapshot = data;
      selfInstanceId = data.self_instance_id || "";
      const dt = Math.round(performance.now() - t0);
      const pollLabel =
        Date.now() < fastPollUntil
          ? POLL_FAST_MS + "ms(发送后加速)"
          : POLL_MS + "ms";
      document.getElementById("status").textContent =
        "UI " +
        UI_VERSION +
        "  ·  本机 " +
        (data.self_instance_id || "<未配置>") +
        "  ·  轮询 " +
        pollLabel +
        "  ·  上次 " +
        dt +
        "ms";

      renderSidebar(data.peer_summaries || [], data.self_instance_id || "");

      if (selectedPeer && forceThread !== false) {
        document.getElementById("thread-head").textContent =
          "与 " + selectedPeer + " 的对话";
      }
      if (selectedPeer) {
        renderThread(data.thread || []);
      } else {
        const box = document.getElementById("messages");
        box.innerHTML = "";
        const d = document.createElement("div");
        d.className = "empty";
        d.textContent = "请先在左侧选择一个联系人";
        box.appendChild(d);
      }
    }

    async function sendMsg() {
      const ta = document.getElementById("input");
      const text = (ta.value || "").trim();
      if (!text) return;
      if (!selectedPeer) {
        setErr("请先在左侧选择接收方");
        return;
      }
      const btn = document.getElementById("send");
      btn.disabled = true;
      setErr("");
      try {
        const ch = document.getElementById("channel").value || "lookup";
        const r = await fetch("/api/send", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to: selectedPeer, text: text, channel: ch }),
        });
        const j = await r.json().catch(() => ({}));
        if (!r.ok) {
          const d = j.detail;
          const msg =
            typeof d === "string"
              ? d
              : Array.isArray(d)
                ? d.map((x) => x.msg || JSON.stringify(x)).join("; ")
                : JSON.stringify(j);
          throw new Error(msg);
        }
        ta.value = "";
        lastThreadKey = "";
        startFastPollBurst();
      } catch (e) {
        setErr(String(e));
      } finally {
        btn.disabled = false;
      }
    }

    document.getElementById("send").addEventListener("click", sendMsg);
    document.getElementById("input").addEventListener("keydown", (ev) => {
      if (ev.key === "Enter" && !ev.shiftKey) {
        ev.preventDefault();
        sendMsg();
      }
    });

    if (selectedPeer) {
      document.getElementById("thread-head").textContent =
        "与 " + selectedPeer + " 的对话";
    }
    refresh(true).then(() => scheduleNextPoll());
  </script>
</body>
</html>
